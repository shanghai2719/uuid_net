name: UltraViewer Auto + Telegram + KeepAlive (Fixed 2026)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-ultraviewer:
    runs-on: windows-2022
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1
      TOKEN: "8416315798:AAGS8j2dQi9Q0qTXpVHMYOJ83ye2Q0wjLNI"
      CHAT_ID: "6229578354"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python + pywinauto (OCR bỏ vì fail PATH)
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          iex ((New-Object Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install python311 -y --force
          python -m pip install --upgrade pip
          python -m pip install pywinauto
          Write-Output "Python + pywinauto installed"

      - name: Install UltraViewer
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.ultraviewer.net/vi/UltraViewer_setup_6.6_vi.exe -OutFile ultra.exe
          Start-Process ultra.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          Write-Output "UltraViewer installed"

      - name: Run UltraViewer & chờ load ID/Pass
        shell: pwsh
        run: |
          $exePath = "${env:ProgramFiles(x86)}\UltraViewer\UltraViewer_Desktop.exe"
          if (-Not (Test-Path $exePath)) {
            $exePath = "$env:ProgramFiles\UltraViewer\UltraViewer_Desktop.exe"
          }
          if (Test-Path $exePath) {
            Start-Process -FilePath $exePath -NoNewWindow
            Write-Output "UltraViewer started tại: $exePath"
            Start-Sleep -Seconds 120  # Chờ 2 phút để UI load đầy đủ ID/Pass
          } else {
            Write-Output "UltraViewer executable not found"
          }

      - name: Extract ID PASS (dùng pywinauto descendants parse title)
        shell: pwsh
        run: |
          $scriptPath = "$env:GITHUB_WORKSPACE\.github\scripts\extract_ultra.py"
          if (Test-Path $scriptPath) {
            python $scriptPath > ultra_output.txt 2>&1
            Get-Content ultra_output.txt  # In full debug ra console
          } else {
            Write-Output "extract_ultra.py not found - add vào .github/scripts/"
          }

      - name: Send Telegram
        shell: pwsh
        run: |
          $output = Get-Content ultra_output.txt -Raw -ErrorAction SilentlyContinue
          if (-not $output) { $output = "No output from extract script" }

          $id = "Không lấy được"
          $pass = "Không lấy được"
          if ($output -match 'UltraViewer_ID:\s*(\S+)') {
            $id = $matches[1].Trim()
          }
          if ($output -match 'UltraViewer_Password:\s*(\S+)') {
            $pass = $matches[1].Trim()
          }

          $msg = "UltraViewer GitHub Runner (Fixed Parse Title)`n"
          $msg += "Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') UTC`n"
          $msg += "ID: $id `n"
          $msg += "PASS: $pass `n`n"
          $msg += "Full debug từ pywinauto (Pane titles):`n"
          $msg += "```````n$output`n``````"

          $body = @{
            chat_id = $env:CHAT_ID
            text = $msg
            parse_mode = "Markdown"
          }
          $json = $body | ConvertTo-Json -Depth 5 -Compress

          try {
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TOKEN/sendMessage" -Method Post -Body $json -ContentType "application/json"
            Write-Output "Telegram sent OK"
          } catch {
            Write-Output "Telegram error: $($_.Exception.Message)"
          }

      - name: Hold runner 6 hours
        shell: pwsh
        run: |
          Write-Output "Holding runner for 6 hours..."
          Start-Sleep -Seconds 21600
          Write-Output "Runner finished"
